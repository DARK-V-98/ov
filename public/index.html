<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"
    />
    <title>OSHADI 💖 — your AI girl</title>

    <!-- PWA: installable as a mobile / desktop app -->
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#ff5c8a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="OSHADI" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <link rel="icon" type="image/png" href="icon-192.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Dancing+Script:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="backdrop" id="backdrop"></div>
    <div class="app">
      <!-- ===== Sidebar ===== -->
      <aside class="sidebar" id="sidebar">
        <div class="brand">
          <div class="brand-avatar" id="brandAvatar">💖</div>
          <div class="brand-name">OSHADI</div>
          <div class="brand-tag">your AI girl</div>
        </div>

        <div class="mood-card">
          <div class="mood-card-title">Current mood</div>
          <div class="mood-now">
            <span class="mood-now-emoji" id="moodEmoji">😊</span>
            <span class="mood-now-label" id="moodLabel">Happy</span>
          </div>
          <div class="mood-bar"><span id="moodBarFill"></span></div>
        </div>

        <!-- Bond / affection -->
        <div class="bond-card">
          <div class="bond-top">
            <span>💞 Bond</span>
            <span class="bond-pct" id="bondPct">20%</span>
          </div>
          <div class="bond-bar"><span id="bondFill"></span></div>
          <div class="bond-label" id="bondLabel">still getting to know you</div>
        </div>

        <div class="panel scroll">
          <label class="field">
            <span>Call you by</span>
            <input id="userName" type="text" placeholder="your name / nickname" />
          </label>

          <label class="field">
            <span>She is your…</span>
            <select id="relationship"></select>
          </label>

          <label class="field">
            <span>She should call you</span>
            <select id="pronoun"></select>
          </label>

          <label class="field">
            <span>Her vibe</span>
            <select id="moodOverride">
              <option value="auto">Auto (let her feel) 💞</option>
            </select>
          </label>

          <!-- Personality sliders -->
          <div class="traits" id="traits">
            <div class="traits-title">Her personality</div>
            <!-- sliders injected by app.js -->
          </div>

          <!-- What she remembers -->
          <div class="memory">
            <div class="memory-title">
              <span>🧠 What she remembers</span>
              <span class="memory-count" id="memCount">0</span>
            </div>
            <ul class="memory-list" id="memList">
              <li class="memory-empty">She's still getting to know you…</li>
            </ul>
          </div>

          <div class="btn-row">
            <button class="ghost-btn" id="clearBtn">🧹 Clear chat</button>
            <button class="ghost-btn danger" id="forgetBtn">💔 Make her forget</button>
          </div>
        </div>

        <div class="status" id="status">connecting…</div>
      </aside>

      <!-- ===== Chat ===== -->
      <main class="chat">
        <header class="chat-head">
          <button class="menu-btn" id="menuBtn" aria-label="Menu">☰</button>
          <div class="chat-head-avatar" id="headAvatar">💖</div>
          <div class="chat-head-info">
            <div class="chat-head-name">OSHADI <span class="dot online" id="onlineDot"></span></div>
            <div class="chat-head-status" id="headStatus">online · feeling happy</div>
            <div class="chat-head-activity" id="headActivity">💖 here with you</div>
          </div>
          <div class="chat-head-right">
            <span class="lang-badge" id="langBadge" title="Chat language">EN</span>
            <button class="install-btn" id="installBtn" hidden>⬇ Install</button>
          </div>
        </header>

        <div class="messages" id="messages"></div>

        <div class="typing" id="typing" hidden>
          <span class="typing-avatar">💖</span>
          <span class="bubble typing-bubble"><i></i><i></i><i></i></span>
        </div>

        <form class="composer" id="composer">
          <input
            id="input"
            type="text"
            autocomplete="off"
            placeholder="Type something sweet to OSHADI…"
          />
          <button type="submit" id="sendBtn" aria-label="Send">➤</button>
        </form>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
